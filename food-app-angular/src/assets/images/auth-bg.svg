<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F44336" />
      <stop offset="100%" stop-color="#FFB74D" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="2" fill="rgba(255,255,255,0.35)" />
    </pattern>
  </defs>

  <rect width="1600" height="1200" fill="url(#bgGradient)" />
  <rect width="1600" height="1200" fill="url(#dots)" />

  <g opacity="0.35">
    <circle cx="400" cy="300" r="220" fill="#FFFFFF" />
    <circle cx="1200" cy="900" r="260" fill="#FFFFFF" />
    <circle cx="800" cy="650" r="170" fill="#FFFFFF" />
  </g>
</svg>
