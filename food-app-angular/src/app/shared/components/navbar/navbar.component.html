<mat-toolbar color="primary" class="app-navbar">
  <button mat-icon-button routerLink="/" class="logo">
    <mat-icon>restaurant</mat-icon>
    <span class="logo-text">Food App</span>
  </button>

  <!-- Search Bar -->
  <div class="search-container">
    <mat-form-field appearance="fill" class="search-field">
      <mat-label>Search restaurants</mat-label>
      <input
        matInput
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()"
        placeholder="Search cuisines, restaurants..."
      />
      <button mat-icon-button matSuffix (click)="onSearch()">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>
  </div>

  <!-- Spacer -->
  <span class="spacer"></span>

  <!-- Navigation Links -->
  <div class="nav-links">
    <!-- Cart -->
    <button
      mat-icon-button
      routerLink="/cart"
      matTooltip="View Cart"
      class="cart-button"
    >
      <mat-icon matBadge="5" matBadgeColor="warn" matBadgeOverlap="false">
        shopping_cart
      </mat-icon>
    </button>

    <!-- Not Authenticated -->
    <div *ngIf="!(isAuthenticated$ | async); else userMenu" class="auth-buttons">
      <button
        mat-raised-button
        routerLink="/auth/login"
        class="login-btn"
      >
        <mat-icon>login</mat-icon>
        Sign In
      </button>
      <button
        mat-flat-button
        color="accent"
        routerLink="/auth/register"
        class="register-btn"
      >
        <mat-icon>person_add</mat-icon>
        Join
      </button>
    </div>

    <!-- Authenticated User Menu -->
    <ng-template #userMenu>
      <button
        mat-icon-button
        [matMenuTriggerFor]="userMenuDropdown"
        class="user-menu-trigger"
        matTooltip="Your Account"
      >
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenuDropdown="matMenu" class="user-menu">
        <div mat-menu-item class="user-info">
          <mat-icon>person</mat-icon>
          <span>{{ (currentUser$ | async)?.name || 'User' }}</span>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/orders">
          <mat-icon>receipt</mat-icon>
          <span>My Orders</span>
        </button>
        <button mat-menu-item routerLink="/profile">
          <mat-icon>edit</mat-icon>
          <span>Edit Profile</span>
        </button>
        <button mat-menu-item routerLink="/addresses">
          <mat-icon>location_on</mat-icon>
          <span>Saved Addresses</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/settings">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>
        <button mat-menu-item>
          <mat-icon>help</mat-icon>
          <span>Help & Support</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </ng-template>

    <!-- Menu Button (Mobile) -->
    <button
      mat-icon-button
      class="mobile-menu-btn"
      [matMenuTriggerFor]="mobileMenu"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #mobileMenu="matMenu" class="mobile-menu">
      <button mat-menu-item routerLink="/">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </button>
      <button mat-menu-item routerLink="/search">
        <mat-icon>search</mat-icon>
        <span>Search</span>
      </button>
      <button mat-menu-item routerLink="/cart">
        <mat-icon>shopping_cart</mat-icon>
        <span>Cart</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item *ngIf="!(isAuthenticated$ | async)" routerLink="/auth/login">
        <mat-icon>login</mat-icon>
        <span>Sign In</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
