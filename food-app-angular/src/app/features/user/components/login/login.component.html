<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header class="login-header">
      <mat-card-title>Sign In</mat-card-title>
      <mat-card-subtitle>Welcome back to Food App</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <!-- Email Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            autocomplete="email"
          />
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="getEmailError()">
            {{ getEmailError() }}
          </mat-error>
        </mat-form-field>

        <!-- Password Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            (click)="togglePasswordVisibility()"
            type="button"
            class="toggle-password"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="getPasswordError()">
            {{ getPasswordError() }}
          </mat-error>
        </mat-form-field>

        <!-- Remember Me & Forgot Password -->
        <div class="remember-forgot">
          <mat-checkbox formControlName="rememberMe" class="remember-me">
            Remember me
          </mat-checkbox>
          <a routerLink="/auth/forgot-password" class="forgot-password">
            Forgot Password?
          </a>
        </div>

        <!-- Sign In Button -->
        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width login-button"
          [disabled]="isLoading || loginForm.invalid"
        >
          <mat-icon *ngIf="!isLoading">login</mat-icon>
          <span *ngIf="!isLoading">Sign In</span>
          <mat-spinner
            *ngIf="isLoading"
            diameter="24"
            class="button-spinner"
          ></mat-spinner>
          <span *ngIf="isLoading">Signing in...</span>
        </button>

        <!-- Sign Up Link -->
        <div class="signup-link">
          <span>Don't have an account?</span>
          <a routerLink="/auth/register" class="link">Sign Up</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
