<div *ngIf="restaurant; else notFound" class="detail">
  <mat-card class="hero-card">
    <img mat-card-image [src]="restaurant.image" alt="{{ restaurant.name }}" />
    <mat-card-header>
      <mat-card-title>{{ restaurant.name }}</mat-card-title>
      <mat-card-subtitle>{{ restaurant.cuisine }} • ★{{ restaurant.rating }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>{{ restaurant.address }}</p>
    </mat-card-content>
  </mat-card>

  <div class="menu">
    <h3>Menu</h3>
    <div class="menu-grid">
      <mat-card *ngFor="let m of restaurant.menu" class="menu-card">
        <mat-card-title>{{ m.name }}</mat-card-title>
        <mat-card-content>
          <p>{{ m.description }}</p>
        </mat-card-content>
        <mat-card-actions>
          <span class="price">${{ m.price }}</span>
          <button mat-flat-button color="primary">Add</button>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>
</div>

<ng-template #notFound>
  <p>Restaurant not found.</p>
</ng-template>
