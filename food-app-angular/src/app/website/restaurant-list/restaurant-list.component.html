<div class="list-grid">
  <mat-card *ngFor="let r of restaurants" class="restaurant-card">
    <img mat-card-image [src]="r.image" alt="{{ r.name }} image" />
    <mat-card-header>
      <mat-card-title>{{ r.name }}</mat-card-title>
      <mat-card-subtitle>{{ r.cuisine }} • ★{{ r.rating }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>{{ r.address }}</p>
    </mat-card-content>
    <mat-card-actions>
      <a mat-button color="primary" [routerLink]="['/restaurants', r.id]">View Menu</a>
    </mat-card-actions>
  </mat-card>
</div>
